<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuWay Roofing | Contact Us</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/images/NWR_favicon.png">
    <link rel="apple-touch-icon" href="assets/images/NWR_favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <header>
        <div data-include="assets/components/header.html"></div>
    </header>
    <main id="contact">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Get Your Free Roof Inspection</h2>
                <p>Schedule your free, no-obligation roof inspection today.</p>
                <div class="contact-detail">
                    <div class="contact-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.59a16 16 0 0 0 5.5 5.5l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </div>
                    <div>
                        <span>Call Us</span>
                        <a href="tel:8649977186">(864) 997-7186</a>
                    </div>
                </div>
                <div class="contact-detail">
                    <div class="contact-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                    <div>
                        <span>Email Us</span>
                        <a href="mailto:nuwayroofsales@gmail.com">nuwayroofsales@gmail.com</a>
                    </div>
                </div>
                <div class="contact-detail">
                    <div class="contact-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/>
                            <circle cx="12" cy="9" r="2.5"/>
                        </svg>
                    </div>
                    <div>
                        <span>Service Area</span>
                        <strong>Upstate South Carolina (check over this)</strong>
                    </div>
                </div>
            </div>
            <div class="contact-form-panel">
                <h2>Get in Touch</h2>
                <form class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="(555) 555-5555">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Property Address <span class="optional">(Optional)</span></label>
                        <input type="text" id="address" name="address" placeholder="123 Main St, City, State">
                    </div>
                    <div class="form-group">
                        <label for="issue">Current Issue</label>
                        <textarea id="issue" name="issue" rows="4" placeholder="e.g. Damaged shingles, leak in bedroom, etc."></textarea>
                    </div>
                    <button type="submit" class="form-submit">Submit</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <div data-include="assets/components/footer.html"></div>
    </footer>
    <script src="assets/scripts/HTMLInclude.min.js"></script>
    <script src="assets/scripts/currentNavPage.js"></script>
    <script src="assets/scripts/hamburger.js" defer></script>
    <script src="assets/scripts/formSubmission.js"></script>
</body>
</html>
